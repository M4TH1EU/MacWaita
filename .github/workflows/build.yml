name: Build and Release MacWaita

on:
  schedule:
    - cron: '0 0 * * SUN'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate Version Tag
        id: vars
        run: echo "VERSION=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV

      - name: Clone MoreWaita Base
        run: git clone --depth=1 https://github.com/somepaulo/MoreWaita.git

      - name: Clone MacTahoe Theme
        run: git clone --depth=1 https://github.com/vinceliuice/MacTahoe-icon-theme.git

      - name: Assemble MacWaita
        run: |
          mv MoreWaita MacWaita
          rm -rf MacWaita/.git
          sed -i 's/Name=MoreWaita/Name=MacWaita/g' MacWaita/index.theme
          
          # Copy MacTahoe source files and symlinks over MoreWaita.
          # The '-f' flag forces overwrite if the file already exists, 
          # but leaves untouched MoreWaita icons exactly where they are.
          for size in 16 22 32 scalable symbolic; do
            if [ -d "MacTahoe-icon-theme/src/apps/$size" ]; then
              mkdir -p MacWaita/$size/apps
              cp -af MacTahoe-icon-theme/src/apps/$size/* MacWaita/$size/apps/
            fi
            
            if [ -d "MacTahoe-icon-theme/links/apps/$size" ]; then
              mkdir -p MacWaita/$size/apps
              cp -af MacTahoe-icon-theme/links/apps/$size/* MacWaita/$size/apps/
            fi
          done

      - name: Zip the Theme
        run: zip -r MacWaita-${{ env.VERSION }}.zip MacWaita/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: MacWaita Release v${{ env.VERSION }}
          body: "Automated build merging MoreWaita with MacTahoe application icons."
          files: MacWaita-${{ env.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
